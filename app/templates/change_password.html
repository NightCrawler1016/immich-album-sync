<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Your Password — Immich Album Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center bg-gray-950 px-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-sky-500/10 border border-sky-500/30 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16l4-4 4 4 4-6 4 6"/>
          <circle cx="18" cy="6" r="2" fill="currentColor" stroke="none"/>
          <rect x="2" y="3" width="20" height="18" rx="3" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">Immich Album Sync</h1>
    </div>

    <!-- Security warning banner -->
    <div class="mb-4 px-4 py-3 rounded-lg bg-amber-900/40 border border-amber-600/60 text-amber-300 text-sm flex items-start gap-2.5">
      <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span>Default credentials detected. Please set a secure password before continuing.</span>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl">

      <h2 class="text-lg font-bold text-white mb-1">Set Your Password</h2>
      <p class="text-sm text-gray-400 mb-5">Choose a new password for the <span class="text-gray-300 font-medium">admin</span> account.</p>

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-900/50 border border-red-700 text-red-300 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/change-password" class="space-y-4">

        <div>
          <label for="new_password" class="block text-sm font-medium text-gray-300 mb-1.5">
            New Password
            <span class="text-gray-500 font-normal ml-1">(min. 8 characters)</span>
          </label>
          <input id="new_password" name="new_password" type="password"
                 required minlength="8" autocomplete="new-password"
                 placeholder="Enter a strong password"
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                        placeholder-gray-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"/>
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password"
                 required minlength="8" autocomplete="new-password"
                 placeholder="Re-enter your password"
                 class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-white
                        placeholder-gray-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"/>
        </div>

        <!-- Password strength hint -->
        <p class="text-xs text-gray-500 -mt-1">
          Use a mix of letters, numbers, and symbols for a stronger password.
        </p>

        <button type="submit"
                class="w-full py-2.5 bg-sky-500 hover:bg-sky-400 text-white font-semibold rounded-lg text-sm
                       focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 focus:ring-offset-gray-900
                       active:scale-95 flex items-center justify-center gap-2">
          Set Password &amp; Continue
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </button>

      </form>
    </div>

    <!-- Logout link -->
    <p class="text-center text-xs text-gray-600 mt-5">
      <a href="/logout" class="hover:text-gray-400 underline underline-offset-2 transition-colors">
        Sign in as a different user
      </a>
    </p>

  </div>

  <!-- Client-side match validation -->
  <script>
    const form = document.querySelector('form');
    const pw = document.getElementById('new_password');
    const confirm = document.getElementById('confirm_password');
    form.addEventListener('submit', (e) => {
      if (pw.value !== confirm.value) {
        e.preventDefault();
        confirm.setCustomValidity('Passwords do not match.');
        confirm.reportValidity();
      } else {
        confirm.setCustomValidity('');
      }
    });
    confirm.addEventListener('input', () => confirm.setCustomValidity(''));
  </script>

</body>
</html>
