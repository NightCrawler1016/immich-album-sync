version: "3.8"

services:
  immich-album-sync:
    image: ghcr.io/nightcrawler1016/immich-album-sync:latest
    container_name: immich-album-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/immich-album-sync:/app/appdata
    environment:
      # REQUIRED: Change this to a long random string for security
      - SECRET_KEY=change-me-to-a-random-secret-key-at-least-32-chars
      # Optional: Set your timezone
      - TZ=America/New_York
      # Optional: UID/GID the app runs as (no longer root). 99:100 = Unraid
      # nobody:users. Change only if your appdata is owned by another user.
      - PUID=99
      - PGID=100
      # Optional: Set to "true" to delete cached files after successful upload
      - CLEANUP_CACHE=false
    labels:
      - "net.unraid.docker.managed=dockerman"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8080]"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/NightCrawler1016/immich-album-sync/main/icon.png"

# Development override — mount local code for live reload
# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
